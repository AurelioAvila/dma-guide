<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Liberation Sans, DejaVu Sans, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2f42"/>
      <stop offset="0.55" stop-color="#0a2036"/>
      <stop offset="1" stop-color="#081627"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#1bd6e8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1bd6e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe8f2"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1bd6e8"/>
      <stop offset="1" stop-color="#3a7bd5"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softbig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint frame -->
  <rect x="24" y="24" width="1232" height="592" rx="18" fill="none" stroke="#1bd6e8" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- ================= RIGHT: network graphic ================= -->
  <g transform="translate(0,0)">
    <!-- glow behind nodes -->
    <circle cx="1000" cy="300" r="150" fill="#1bd6e8" opacity="0.08" filter="url(#softbig)"/>

    <!-- connection path -->
    <path d="M 840 400 C 900 360 900 250 970 230 S 1120 300 1180 250"
          fill="none" stroke="url(#line)" stroke-width="3" opacity="0.85" filter="url(#soft)"/>
    <path d="M 840 400 C 900 360 900 250 970 230 S 1120 300 1180 250"
          fill="none" stroke="url(#line)" stroke-width="2" opacity="0.95"/>

    <!-- secondary faint links -->
    <path d="M 970 230 L 1050 380 M 900 300 L 1050 380 M 1120 275 L 1050 380"
          stroke="#1bd6e8" stroke-width="1.2" stroke-opacity="0.35" fill="none"/>

    <!-- nodes -->
    <g>
      <circle cx="840" cy="400" r="8" fill="#1bd6e8"/>
      <circle cx="840" cy="400" r="16" fill="none" stroke="#1bd6e8" stroke-opacity="0.4" stroke-width="1.5"/>
      <circle cx="970" cy="230" r="10" fill="#8fe9f2"/>
      <circle cx="970" cy="230" r="20" fill="none" stroke="#1bd6e8" stroke-opacity="0.4" stroke-width="1.5"/>
      <circle cx="1180" cy="250" r="7" fill="#3a7bd5"/>
      <circle cx="1050" cy="380" r="9" fill="#1bd6e8"/>
      <circle cx="1120" cy="275" r="5" fill="#8fe9f2"/>
      <circle cx="900" cy="300" r="5" fill="#8fe9f2"/>
    </g>

    <!-- Network pill -->
    <g transform="translate(902,196)">
      <rect x="0" y="0" width="126" height="40" rx="20" fill="#0e3a4f" stroke="#1bd6e8" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle cx="24" cy="20" r="5" fill="#1bd6e8"/>
      <text x="42" y="26" fill="#cfe8f2" font-size="17" font-weight="bold">Network</text>
    </g>
  </g>

  <!-- ================= LEFT: text block ================= -->
  <!-- eyebrow -->
  <text x="92" y="196" fill="#1bd6e8" font-size="17" font-weight="bold" letter-spacing="5">SECURITY REFERENCE  ·  DEFENSIVE</text>

  <!-- title -->
  <text x="88" y="300" fill="url(#title)" font-size="96" font-weight="bold" letter-spacing="1">DMA Guide</text>

  <!-- subtitle -->
  <text x="92" y="362" fill="#38d6e8" font-size="30" font-weight="bold">DMA security · IOMMU flow · OS control &amp; defense</text>

  <!-- description -->
  <text x="92" y="412" fill="#9fbccd" font-size="19">A compact, defensive guide to device memory access, isolation,</text>
  <text x="92" y="440" fill="#9fbccd" font-size="19">and threat-aware system design.</text>

  <!-- bottom info pill -->
  <g transform="translate(88,506)">
    <rect x="0" y="0" width="640" height="70" rx="14" fill="#0d3346" fill-opacity="0.7" stroke="#1bd6e8" stroke-opacity="0.28" stroke-width="1.5"/>
    <circle cx="34" cy="35" r="9" fill="none" stroke="#1bd6e8" stroke-width="2"/>
    <circle cx="34" cy="35" r="3.5" fill="#1bd6e8"/>
    <text x="60" y="30" fill="#e6f3f8" font-size="17" font-weight="bold">Interactive concepts</text>
    <text x="60" y="52" fill="#9fbccd" font-size="15">Explore IOMMU, DMA and protection patterns across the docs.</text>
  </g>
</svg>
